name: Code Quality
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    uses: mruoss/action_elixir_run_tests/.github/workflows/elixir-code-quality.yml@v2.3.2
    with:
      checkout: true
      with-kubernetes: false
      check-formatting: true
      run-credo: false
      run-dialyzer: false
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
